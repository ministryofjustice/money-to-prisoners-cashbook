# generated by https://github.com/ministryofjustice/money-to-prisoners-deploy
name: Security snyk image scan
on:
  workflow_dispatch:
    # allow manual trigger from github
  schedule:
    - cron: "21 6 * * 1" # Every Monday, early
jobs:
  security-snyk-image-scan:
    name: Scan the published container image
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_snyk_scan_ecr.yml@v2 # WORKFLOW_VERSION
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
      image_ref: ghcr.io/ministryofjustice/money-to-prisoners-cashbook:latest
    secrets: inherit
