# generated by https://github.com/ministryofjustice/money-to-prisoners-deploy
name: Build, test and push
on:
  push:
jobs:
  build-test-push:
    name: Build and test (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: amd64
            runner: ubuntu-latest
          - platform: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Log docker into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          branch_lc=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]')
          version=${branch_lc}.${GITHUB_SHA::7}
          tag=cashbook.${version}
          ghcr_package=ghcr.io/${{ github.repository_owner }}/money-to-prisoners-cashbook
          ghcr_base=ghcr.io/${{ github.repository_owner }}/money-to-prisoners-base
          echo "branch_lc=${branch_lc}"         >> "$GITHUB_OUTPUT"
          echo "version=${version}"             >> "$GITHUB_OUTPUT"
          echo "tag=${tag}"                     >> "$GITHUB_OUTPUT"
          echo "ghcr_package=${ghcr_package}"   >> "$GITHUB_OUTPUT"
          echo "ghcr_base=${ghcr_base}"         >> "$GITHUB_OUTPUT"
          echo "Building ${tag} for linux/${{ matrix.platform }}"

      
      - name: Pull base image
        env:
          GHCR_BASE: ${{ steps.tags.outputs.ghcr_base }}
        run: |
          docker pull ${GHCR_BASE}:base-web
          docker tag ${GHCR_BASE}:base-web base-web

      - name: Build docker image
        env:
          TAG: ${{ steps.tags.outputs.tag }}
        run: |
          docker build \
            --force-rm \
            --build-arg APP_GIT_COMMIT=${GITHUB_SHA} \
            --build-arg APP_GIT_BRANCH=${GITHUB_REF_NAME} \
            --build-arg APP_BUILD_TAG=${TAG} \
            --build-arg APP_BUILD_DATE=$(date +%FT%T%z) \
            --tag ${TAG} \
            .

      
      - name: Test docker image
        env:
          TAG: ${{ steps.tags.outputs.tag }}
        run: |
          docker run \
            --name cashbook \
            -e DJANGO_SETTINGS_MODULE=mtp_cashbook.settings.ci \
            ${TAG} \
            /bin/bash -c '/app/venv/bin/pip install -r requirements/ci.txt && /app/venv/bin/python manage.py test --verbosity=2'

      - name: Extract test reports
        if: always()
        run: |
          docker cp cashbook:/app/reports /tmp/reports || true
          docker rm cashbook || true

      - name: Publish test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.platform }}
          path: /tmp/reports
          if-no-files-found: warn

      
      - name: Push docker image
        env:
          TAG: ${{ steps.tags.outputs.tag }}
          VERSION: ${{ steps.tags.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
          GHCR_PACKAGE: ${{ steps.tags.outputs.ghcr_package }}
        run: |
          echo "Pushing ${VERSION}-${PLATFORM} to ${GHCR_PACKAGE}"
          docker tag ${TAG} ${GHCR_PACKAGE}:${VERSION}-${PLATFORM}
          docker push ${GHCR_PACKAGE}:${VERSION}-${PLATFORM}

  merge-and-deploy:
    name: Merge platforms and deploy to test
    needs: build-test-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log docker into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          branch_lc=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]')
          version=${branch_lc}.${GITHUB_SHA::7}
          ghcr_package=ghcr.io/${{ github.repository_owner }}/money-to-prisoners-cashbook
          echo "version=${version}"           >> "$GITHUB_OUTPUT"
          echo "ghcr_package=${ghcr_package}" >> "$GITHUB_OUTPUT"

      - name: Merge into a multi-arch manifest
        env:
          VERSION: ${{ steps.tags.outputs.version }}
          GHCR_PACKAGE: ${{ steps.tags.outputs.ghcr_package }}
        run: |
          echo "Merging ${VERSION} from amd64 and arm64"
          docker buildx imagetools create \
            --tag ${GHCR_PACKAGE}:${VERSION} \
            ${GHCR_PACKAGE}:${VERSION}-amd64 \
            ${GHCR_PACKAGE}:${VERSION}-arm64
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "Pointing latest at ${VERSION}"
            docker buildx imagetools create \
              --tag ${GHCR_PACKAGE}:latest \
              ${GHCR_PACKAGE}:${VERSION}
          fi

      
      - name: Install kubectl
        if: ${{ github.ref_name == 'main' && vars.GHA_DEPLOY_ENABLED == 'true' }}
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.9

      - name: Deploy to test
        if: ${{ github.ref_name == 'main' && vars.GHA_DEPLOY_ENABLED == 'true' }}
        env:
          VERSION: ${{ steps.tags.outputs.version }}
          GHCR_PACKAGE: ${{ steps.tags.outputs.ghcr_package }}
          K8S_CLUSTER_CERT: ${{ secrets.K8S_CLUSTER_CERT }}
          K8S_CLUSTER_NAME: ${{ secrets.K8S_CLUSTER_NAME }}
          K8S_CLUSTER_SERVER: ${{ secrets.K8S_CLUSTER_SERVER }}
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
          K8S_TOKEN: ${{ secrets.K8S_TOKEN }}
        run: |
          echo "Deploying to test"
          echo -n "${K8S_CLUSTER_CERT}" | base64 -d > /tmp/mtp-k8s-ca.crt
          kubectl config set-cluster ${K8S_CLUSTER_NAME} --certificate-authority=/tmp/mtp-k8s-ca.crt --server=${K8S_CLUSTER_SERVER}
          kubectl config set-credentials github-actions --token=${K8S_TOKEN}
          kubectl config set-context ${K8S_CLUSTER_NAME} --cluster=${K8S_CLUSTER_NAME} --user=github-actions --namespace=${K8S_NAMESPACE}
          kubectl config use-context ${K8S_CLUSTER_NAME}
          IMAGE=${GHCR_PACKAGE}:${VERSION}
          kubectl patch configmap app-versions --patch "{\"data\": {\"cashbook\": \"${VERSION}\"}}"
          kubectl patch deployment cashbook --type strategic --patch "{\"metadata\": {\"annotations\": {\"kubernetes.io/change-cause\": \"${VERSION}\"}}, \"spec\": {\"template\": {\"spec\": {\"containers\": [{\"name\": \"app\", \"image\": \"${IMAGE}\"}], \"initContainers\": [{\"name\": \"copy-static\", \"image\": \"${IMAGE}\"}]}}}}"
