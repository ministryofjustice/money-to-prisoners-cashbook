# generated by https://github.com/ministryofjustice/money-to-prisoners-deploy
name: Clean GHCR
on:
  pull_request:
    # clean up branch images when a PR is closed
    types:
      - closed
  workflow_dispatch:
  schedule:
    # A PR merged while its own build is still running is cleaned up before that build
    # pushes its image, so sweep up anything left behind by a branch that has since gone.
    - cron: '21 3 * * 1'
jobs:
  clean-ghcr:
    name: Clean GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # a package can only be administered by a token from the repository it is linked to
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: main
      - name: Delete branch images from GHCR
        run: python3 .github/scripts/clean-ghcr.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
